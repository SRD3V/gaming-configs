//--------------------------------------------- Color change stuff ---------------------------------------------

alias +col_loh1 "+attack; topcolor 0; alias +mm1 +col_loh2"
alias +col_loh2 "+attack; topcolor 100; alias +mm1 +col_loh3"
alias +col_loh3 "+attack; topcolor 150; alias +mm1 +col_loh4"
alias +col_loh4 "+attack; topcolor 230; alias +mm1 +col_loh5"
alias +col_loh5 "+attack; topcolor 900; alias +mm1 +col_loh6"
alias +col_loh6 "+attack; topcolor 195; alias +mm1 +col_loh1"
alias -col_loh1 "-attack"
alias -col_loh2 "-attack"
alias -col_loh3 "-attack"
alias -col_loh4 "-attack"
alias -col_loh5 "-attack"
alias -col_loh6 "-attack"
alias +mm1 +col_loh1
